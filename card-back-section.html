<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
      padding: 10px;
      margin: 0;
    }
    .progress-summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .progress-text {
      font-size: 16px;
      font-weight: 600;
      color: #172b4d;
    }
    .progress-percentage {
      font-size: 14px;
      color: #5e6c84;
    }
    .progress-bar {
      height: 8px;
      background: #dfe1e6;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .progress-fill {
      height: 100%;
      transition: width 0.3s ease;
    }
    .progress-fill.complete { background: #61bd4f; }
    .progress-fill.high { background: #c9df56; }
    .progress-fill.medium { background: #f2d600; }
    .progress-fill.low { background: #ff9f1a; }
    .progress-fill.minimal { background: #eb5a46; }
    .checklist-breakdown {
      font-size: 12px;
      color: #5e6c84;
    }
    .checklist-breakdown-item {
      margin-bottom: 4px;
    }
    .no-checklists {
      color: #5e6c84;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="content">
    <div class="no-checklists">No checklists</div>
  </div>

  <script>
    var t = TrelloPowerUp.iframe();

    function getProgressClass(percentage) {
      if (percentage === 100) return 'complete';
      if (percentage >= 75) return 'high';
      if (percentage >= 50) return 'medium';
      if (percentage >= 25) return 'low';
      return 'minimal';
    }

    t.card('checklists')
      .then(function(card) {
        var content = document.getElementById('content');
        
        if (!card.checklists || card.checklists.length === 0) {
          content.innerHTML = '<div class="no-checklists">No checklists on this card</div>';
          return;
        }

        var totalItems = 0;
        var completedItems = 0;

        card.checklists.forEach(function(checklist) {
          var items = checklist.checkItems || [];
          totalItems += items.length;
          completedItems += items.filter(function(item) {
            return item.state === 'complete';
          }).length;
        });

        var percentage = totalItems > 0 ? Math.round((completedItems / totalItems) * 100) : 0;
        var progressClass = getProgressClass(percentage);

        var html = '<div class="progress-summary">';
        html += '<div class="progress-text">' + completedItems + ' of ' + totalItems + ' complete</div>';
        html += '<div class="progress-percentage">' + percentage + '%</div>';
        html += '</div>';
        html += '<div class="progress-bar">';
        html += '<div class="progress-fill ' + progressClass + '" style="width: ' + percentage + '%"></div>';
        html += '</div>';

        if (card.checklists.length > 1) {
          html += '<div class="checklist-breakdown">';
          card.checklists.forEach(function(checklist) {
            var items = checklist.checkItems || [];
            var checklistTotal = items.length;
            var checklistComplete = items.filter(function(item) {
              return item.state === 'complete';
            }).length;
            html += '<div class="checklist-breakdown-item">';
            html += '• ' + checklist.name + ': ' + checklistComplete + '/' + checklistTotal;
            html += '</div>';
          });
          html += '</div>';
        }

        content.innerHTML = html;
      })
      .catch(function(error) {
        console.error('Error loading checklists:', error);
      });
  </script>
</body>
</html>
